<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Code Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <span>Enter Your Text or URL To Generate QR Code</span>

      <input type="text" id="qr-text" placeholder="Enter Text or URL" />

      <div class="qr" id="qr">
        <img id="img" src="" alt="QR Code" />
      </div>

      <button id="btn">Generate QR</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
